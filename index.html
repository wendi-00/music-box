<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Music Box</title> 
<meta name="title" content="Happy Place: A Digital Music Box">
<meta name="description" content="An interactive 3D experience featuring a copycat Skull Panda. Click to explore.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://your-site-name.netlify.app/">
<meta property="og:title" content="Happy Place: A Digital Music Box">
<meta property="og:description" content="An interactive 3D experience featuring a copycat Skull Panda.">
<meta property="og:image" content="box_closed.jpg">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:title" content="Music Box">
<meta property="twitter:description" content="Interactive 3D Ballerina Music Box.">
<meta property="twitter:image" content="box_closed.jpg">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; overflow: hidden; font-family: sans-serif; }
        
        #box-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b2e 0%, #05000a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Container to crop out the text at the bottom of the box image */
        .box-container {
            width: 300px;
            height: 340px; 
            overflow: hidden; /* This hides the bottom portion containing the text */
            display: flex;
            justify-content: center;
            filter: drop-shadow(0 0 30px rgba(209, 179, 255, 0.4));
        }

        #box-img { 
            width: 300px; 
            height: auto;
            cursor: pointer;
            transition: transform 0.5s ease;
            object-position: top; /* Keeps the top of the box visible */
        }

        #box-img:hover { transform: scale(1.05); }
        
        .hint { color: #d1b3ff; margin-top: 20px; letter-spacing: 3px; text-transform: uppercase; font-size: 12px; opacity: 0.6; }
        
        #ui { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #d1b3ff; pointer-events: none; opacity: 0; transition: opacity 2s; }
        .active #ui { opacity: 1; }
    </style>
</head>
<body>

    <div id="box-overlay">
        <div class="box-container">
            <img src="box_closed.png" id="box-img" alt="Click to open">
        </div>
        <div class="hint">Click to open the music box</div>
    </div>

    <div id="ui"><div class="label">Drag to rotate</div></div>

    <script>
        const SCENES = ['scene1.png', 'scene2.png', 'scene3.png', 'scene4.png'];
        const PANDA_FILE = 'panda_character.png';
        const MUSIC_FILE = 'Jade_Echoes.mp3';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load(MUSIC_FILE, (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(0.5);
        });

        document.getElementById('box-img').addEventListener('click', function() {
            if (sound.context.state === 'suspended') { sound.context.resume(); }
            sound.play(); 
            document.getElementById('box-overlay').style.opacity = '0';
            document.getElementById('box-overlay').style.transform = 'scale(2)';
            document.body.classList.add('active'); 
            setTimeout(() => { document.getElementById('box-overlay').style.display = 'none'; }, 1200);
        });

        const loader = new THREE.TextureLoader();
        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        SCENES.forEach((file, i) => {
            loader.load(file, (texture) => {
                const geometry = new THREE.CylinderGeometry(20, 20, 45, 40, 1, true, (Math.PI / 2) * i, Math.PI / 2);
                geometry.scale(-1, 1, 1);
                const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
                const panel = new THREE.Mesh(geometry, material);
                worldGroup.add(panel);
            });
        });

        loader.load(PANDA_FILE, (pTexture) => {
            const panda = new THREE.Sprite(new THREE.SpriteMaterial({ map: pTexture }));
            panda.scale.set(10, 10, 1);
            panda.position.set(0, -1.5, 0);
            scene.add(panda);
        });

        camera.position.z = 15;

        let isDragging = false, prevX = 0;
        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging) { worldGroup.rotation.y += (e.clientX - prevX) * 0.005; }
            prevX = e.clientX;
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.0047; 
            const panda = scene.children.find(child => child.type === "Sprite");
            if (panda) {
                panda.position.y = -1.5 + Math.sin(time) * 0.35;
                const pulse = 1 + Math.sin(time) * 0.04;
                panda.scale.set(10 * pulse, 10 * pulse, 1);
            }
            if (!isDragging && document.body.classList.contains('active')) {
                worldGroup.rotation.y += 0.001; 
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
