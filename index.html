<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Zodiac Sanctuary</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #instruction {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #d1b3ff; letter-spacing: 5px; text-transform: uppercase; font-size: 11px;
            pointer-events: none; text-shadow: 0 0 10px #7b4eb3;
        }
    </style>
</head>
<body>
    <div id="instruction">Click to Wind the Key & Open</div>

    <script>
        // Assets from your project
        const SCENES = ['scene1.png', 'scene2.png', 'scene3.png', 'scene4.png'];
        const PANDA_FILE = 'panda_character.png';
        const MUSIC_FILE = 'Jade_Echoes.mp3';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- ENHANCED LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const rimLight = new THREE.PointLight(0xd1b3ff, 2, 50);
        rimLight.position.set(-10, 10, 10);
        scene.add(rimLight);

        const loader = new THREE.TextureLoader();
        const boxGroup = new THREE.Group();
        scene.add(boxGroup);

        // --- MATERIALS ---
        const bambooMat = new THREE.MeshStandardMaterial({ color: 0x1a0f0a, roughness: 0.4 });
        const irisMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x4a2c73, metalness: 0.4, roughness: 0.1, 
            transmission: 0.2, thickness: 0.5, iridescence: 1.0 
        });

        // 1. THE BASE CHEST
        const baseBox = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 8), irisMat);
        boxGroup.add(baseBox);

        // Bamboo Ribbing (Cylinders at corners)
        const ribGeom = new THREE.CylinderGeometry(0.4, 0.4, 6, 12);
        const corners = [[5,0,4], [-5,0,4], [5,0,-4], [-5,0,-4]];
        corners.forEach(pos => {
            const rib = new THREE.Mesh(ribGeom, bambooMat);
            rib.position.set(...pos);
            boxGroup.add(rib);
        });

        // 2. THE HINGED LID
        const lidPivot = new THREE.Group();
        lidPivot.position.set(0, 3, -4); // Back-top hinge point
        boxGroup.add(lidPivot);

        const lidGeom = new THREE.CylinderGeometry(4, 4, 10, 32, 1, false, 0, Math.PI);
        lidGeom.rotateZ(Math.PI / 2);
        const lid = new THREE.Mesh(lidGeom, irisMat);
        lid.position.set(0, 0, 4);
        lidPivot.add(lid);

        // 3. THE INTERIOR STAGE
        const stageGroup = new THREE.Group();
        stageGroup.position.y = 1;
        boxGroup.add(stageGroup);

        // Rotating Cylindrical Backdrop (Confined to box)
        const sceneBackdrop = new THREE.Group();
        stageGroup.add(sceneBackdrop);
        SCENES.forEach((file, i) => {
            loader.load(file, (tex) => {
                const panel = new THREE.Mesh(
                    new THREE.CylinderGeometry(3.5, 3.5, 5, 20, 1, true, (Math.PI/2)*i, Math.PI/2),
                    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0.9 })
                );
                panel.scale.x = -1;
                sceneBackdrop.add(panel);
            });
        });

        // The Character
        let panda;
        loader.load(PANDA_FILE, (tex) => {
            panda = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            panda.scale.set(6, 6, 1);
            panda.position.y = 1.5;
            stageGroup.add(panda);
        });

        // Golden Key
        const keyGroup = new THREE.Group();
        const keyRing = new THREE.Mesh(new THREE.TorusGeometry(1, 0.2, 12, 24), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1 }));
        keyGroup.add(keyRing);
        keyGroup.position.set(6.5, -1, 0);
        keyGroup.rotation.y = Math.PI / 2;
        boxGroup.add(keyGroup);

        // --- AUDIO ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load(MUSIC_FILE, (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
        });

        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        let isOpen = false;
        window.addEventListener('mousedown', () => {
            if (!isOpen) {
                isOpen = true;
                sound.play(); //
                document.getElementById('instruction').style.opacity = '0';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;

            if (isOpen) {
                // Hinge opens
                if (lidPivot.rotation.x > -Math.PI * 0.65) lidPivot.rotation.x -= 0.04;
                
                // Character/Scene animations
                sceneBackdrop.rotation.y += 0.01;
                keyGroup.rotation.z += 0.15;
                if (panda) {
                    panda.position.y = 1.5 + Math.sin(time) * 0.25;
                }
            } else {
                boxGroup.rotation.y = Math.sin(time * 0.5) * 0.1;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
