<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Zodiac Sanctuary</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; overflow: hidden; font-family: sans-serif; }
        #instruction {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #d1b3ff; letter-spacing: 3px; text-transform: uppercase; font-size: 12px;
            pointer-events: none; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <div id="instruction">Click the Winding Key to Open</div>

    <script>
        const SCENES = ['scene1.png', 'scene2.png', 'scene3.png', 'scene4.png'];
        const PANDA_FILE = 'panda_character.png';
        const MUSIC_FILE = 'Jade_Echoes.mp3';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xd1b3ff, 2, 100);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        // Audio
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load(MUSIC_FILE, (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(0.5);
        });

        // The Music Box Group
        const musicBox = new THREE.Group();
        scene.add(musicBox);

        // 1. The Base
        const baseGeom = new THREE.BoxGeometry(12, 6, 8);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x2a1a3d, roughness: 0.5, metalness: 0.3 });
        const boxBase = new THREE.Mesh(baseGeom, baseMat);
        musicBox.add(boxBase);

        // 2. The Lid (Hinged)
        const lidGroup = new THREE.Group();
        lidGroup.position.set(0, 3, -4); // Set hinge at the back top edge
        musicBox.add(lidGroup);

        const lidGeom = new THREE.CylinderGeometry(4, 4, 12, 32, 1, false, 0, Math.PI);
        lidGeom.rotateZ(Math.PI / 2);
        const lid = new THREE.Mesh(lidGeom, baseMat);
        lid.position.set(0, 0, 4); 
        lidGroup.add(lid);

        // 3. The Winding Key
        const keyGroup = new THREE.Group();
        const keyRing = new THREE.Mesh(new THREE.TorusGeometry(1.2, 0.3, 16, 32), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1 }));
        keyGroup.add(keyRing);
        keyGroup.position.set(7, 0, 0);
        keyGroup.rotation.y = Math.PI / 2;
        musicBox.add(keyGroup);

        // Interior Sanctuary
        const loader = new THREE.TextureLoader();
        const sanctuary = new THREE.Group();
        sanctuary.visible = false;
        scene.add(sanctuary);

        SCENES.forEach((file, i) => {
            loader.load(file, (texture) => {
                const panel = new THREE.Mesh(
                    new THREE.CylinderGeometry(25, 25, 50, 40, 1, true, (Math.PI/2)*i, Math.PI/2),
                    new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide })
                );
                panel.scale.x = -1;
                sanctuary.add(panel);
            });
        });

        // Character Figure
        let panda;
        loader.load(PANDA_FILE, (texture) => {
            panda = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
            panda.scale.set(12, 12, 1);
            sanctuary.add(panda);
        });

        camera.position.set(0, 5, 25);

        let isOpen = false;
        window.addEventListener('mousedown', () => {
            if (!isOpen) {
                isOpen = true;
                sound.play();
                document.getElementById('instruction').style.opacity = '0';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            if (isOpen) {
                // Open Lid animation
                if (lidGroup.rotation.x > -Math.PI * 0.7) lidGroup.rotation.x -= 0.03;
                
                // Transition Camera inside
                if (camera.position.z > 5) camera.position.z -= 0.2;
                
                // Show world and rotate character
                sanctuary.visible = true;
                if (panda) {
                    panda.rotation.y += 0.02;
                    panda.position.y = -1 + Math.sin(time * 2) * 0.5;
                }
                sanctuary.rotation.y += 0.003;
                keyGroup.rotation.z += 0.1; // Key spins
            } else {
                // Idle floating effect
                musicBox.rotation.y = Math.sin(time * 0.5) * 0.2;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
