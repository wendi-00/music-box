<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zodiac Sanctuary Music Box</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; overflow: hidden; font-family: sans-serif; }
        #instruction {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #d1b3ff; letter-spacing: 4px; text-transform: uppercase; font-size: 11px;
            pointer-events: none; text-shadow: 0 0 10px #7b4eb3;
        }
    </style>
</head>
<body>
    <div id="instruction">Click the Winding Key to Open</div>

    <script>
        const SCENES = ['scene1.jpg', 'scene2.jpg', 'scene3.jpg', 'scene4.jpg'];
        const PANDA_FILE = 'panda_character.png';
        const BOX_TEXTURE = 'box_closed.jpg';
        const MUSIC_FILE = 'Jade_Echoes.mp3';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const spot = new THREE.PointLight(0xd1b3ff, 1.5, 100);
        spot.position.set(5, 10, 10);
        scene.add(spot);

        const loader = new THREE.TextureLoader();
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // --- 3D BOX CONSTRUCTION ---
        const boxTexture = loader.load(BOX_TEXTURE);
        const boxMat = new THREE.MeshStandardMaterial({ map: boxTexture, roughness: 0.4 });
        
        // Lower Chest
        const chestBase = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 8), boxMat);
        mainGroup.add(chestBase);

        // The Lid with Hinge
        const lidPivot = new THREE.Group();
        lidPivot.position.set(0, 2.5, -4); // Back edge hinge
        mainGroup.add(lidPivot);

        const lid = new THREE.Mesh(new THREE.BoxGeometry(10, 1.5, 8), boxMat);
        lid.position.set(0, 0.75, 4); // Offset so it sits on the base
        lidPivot.add(lid);

        // --- INTERIOR STAGE ---
        const stage = new THREE.Group();
        stage.position.y = 2.6;
        stage.visible = false;
        mainGroup.add(stage);

        // Rotating Background Scenes
        const backdrop = new THREE.Group();
        stage.add(backdrop);
        SCENES.forEach((file, i) => {
            loader.load(file, (tex) => {
                const panel = new THREE.Mesh(
                    new THREE.CylinderGeometry(4, 4, 6, 20, 1, true, (Math.PI/2)*i, Math.PI/2),
                    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
                );
                panel.scale.x = -1;
                backdrop.add(panel);
            });
        });

        // Figurina (Ballerina)
        let ballerina;
        loader.load(PANDA_FILE, (tex) => {
            ballerina = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            ballerina.scale.set(7, 7, 1);
            ballerina.position.y = 2;
            stage.add(ballerina);
        });

        // Winding Key
        const keyGroup = new THREE.Group();
        const keyRing = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.2, 12, 24), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1 }));
        keyGroup.add(keyRing);
        keyGroup.position.set(5.5, -1, 0);
        keyGroup.rotation.y = Math.PI / 2;
        mainGroup.add(keyGroup);

        // --- AUDIO & CAMERA ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load(MUSIC_FILE, (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
        });

        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        let isOpen = false;
        window.addEventListener('mousedown', () => {
            if (!isOpen) {
                isOpen = true;
                sound.play(); //
                document.getElementById('instruction').style.opacity = '0';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;

            if (isOpen) {
                // Hinge Rotation
                if (lidPivot.rotation.x > -2) lidPivot.rotation.x -= 0.03;
                
                stage.visible = true;
                backdrop.rotation.y += 0.01;
                keyGroup.rotation.z += 0.15;
                
                if (ballerina) {
                    ballerina.position.y = 2 + Math.sin(time) * 0.2; // Hover effect
                    ballerina.rotation.y += 0.02; // Spin effect
                }
            } else {
                // Subtle floating idle
                mainGroup.rotation.y = Math.sin(time * 0.5) * 0.1;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
