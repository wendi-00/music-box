<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zodiac Sanctuary Music Box</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; overflow: hidden; font-family: sans-serif; }
        
        /* The Music Box Lid Overlay */
        #box-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0b2e 0%, #05000a 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #box-img { 
            width: 300px; cursor: pointer; filter: drop-shadow(0 0 30px rgba(209, 179, 255, 0.4));
            transition: transform 0.5s ease;
        }
        #box-img:hover { transform: scale(1.05); }
        .hint { color: #d1b3ff; margin-top: 20px; letter-spacing: 3px; text-transform: uppercase; font-size: 12px; opacity: 0.6; }
        
        /* The UI inside the world */
        #ui { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #d1b3ff; pointer-events: none; opacity: 0; transition: opacity 2s; }
        .active #ui { opacity: 1; }
    </style>
</head>
<body>

    <div id="box-overlay">
        <img src="box_closed.jpg" id="box-img" alt="Click to open">
        <div class="hint">Click to Open the Sanctuary</div>
    </div>

    <div id="ui"><div class="label">Drag to explore the Zodiac</div></div>

    <script>
        // Updated to .jpg to match your files
        const SCENES = ['scene1.jpg', 'scene2.jpg', 'scene3.jpg', 'scene4.jpg'];
        const PANDA_FILE = 'panda_character.png';
        const MUSIC_FILE = 'Jade_Echoes.mp3';

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Audio Setup
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load(MUSIC_FILE, (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
            sound.setVolume(0.5);
        });

        // Box Opening Logic
        document.getElementById('box-img').addEventListener('click', function() {
            sound.play(); 
            document.getElementById('box-overlay').style.opacity = '0';
            document.getElementById('box-overlay').style.transform = 'scale(2)';
            document.body.classList.add('active'); 
            setTimeout(() => { document.getElementById('box-overlay').style.display = 'none'; }, 1200);
        });

        const loader = new THREE.TextureLoader();
        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        SCENES.forEach((file, i) => {
            const texture = loader.load(file);
            const geometry = new THREE.CylinderGeometry(20, 20, 45, 40, 1, true, (Math.PI / 2) * i, Math.PI / 2);
            geometry.scale(-1, 1, 1); 
            const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
            const panel = new THREE.Mesh(geometry, material);
            worldGroup.add(panel);
        });

        const pTexture = loader.load(PANDA_FILE);
        const panda = new THREE.Sprite(new THREE.SpriteMaterial({ map: pTexture }));
        panda.scale.set(10, 10, 1);
        panda.position.set(0, -1.5, 0);
        scene.add(panda);

        camera.position.z = 15;

        // Interaction Logic
        let isDragging = false, prevX = 0;
        document.addEventListener('mousedown', () => isDragging = true);
        document.addEventListener('mouseup', () => isDragging = false);
        document.addEventListener('mousemove', (e) => {
            if (isDragging) { worldGroup.rotation.y += (e.clientX - prevX) * 0.005; }
            prevX = e.clientX;
        });
