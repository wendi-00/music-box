<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Zodiac Sanctuary 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #05000a; overflow: hidden; font-family: sans-serif; }
        #instruction {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #d1b3ff; letter-spacing: 4px; text-transform: uppercase; font-size: 11px;
            pointer-events: none; text-shadow: 0 0 10px #7b4eb3;
        }
    </style>
</head>
<body>
    <div id="instruction">Click the Winding Key to Open</div>

    <script>
        const SCENES = ['scene1.png', 'scene2.png', 'scene3.png', 'scene4.png'];
        const PANDA_FILE = 'panda_character.png';
        const BOX_TEXTURE = 'box_closed.png';
        const MUSIC_FILE = 'Jade_Echoes.mp3';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const spot = new THREE.PointLight(0xd1b3ff, 2, 100);
        spot.position.set(5, 10, 10);
        scene.add(spot);

        const loader = new THREE.TextureLoader();
        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // --- THE 3D CHEST (USING YOUR IMAGE) ---
        const boxTexture = loader.load(BOX_TEXTURE);
        const boxMat = new THREE.MeshStandardMaterial({ map: boxTexture, roughness: 0.3, metalness: 0.2 });
        
        // Base of the Chest
        const baseGeom = new THREE.BoxGeometry(10, 5, 7);
        const chestBase = new THREE.Mesh(baseGeom, boxMat);
        mainGroup.add(chestBase);

        // Hinged Lid
        const lidGroup = new THREE.Group();
        lidGroup.position.set(0, 2.5, -3.5); // Hinge at back top
        mainGroup.add(lidGroup);

        const lidGeom = new THREE.BoxGeometry(10, 1.5, 7);
        const chestLid = new THREE.Mesh(lidGeom, boxMat);
        chestLid.position.set(0, 0.75, 3.5);
        lidGroup.add(chestLid);

        // --- THE INTERIOR STAGE ---
        const stageGroup = new THREE.Group();
        stageGroup.position.y = 1.5;
        stageGroup.scale.set(0.1, 0.1, 0.1); // Hide initially
        mainGroup.add(stageGroup);

        // Rotating Scenes (Small Background Screen)
        const sceneScreen = new THREE.Group();
        stageGroup.add(sceneScreen);
        SCENES.forEach((file, i) => {
            loader.load(file, (tex) => {
                const panel = new THREE.Mesh(
                    new THREE.CylinderGeometry(8, 8, 12, 20, 1, true, (Math.PI/2)*i, Math.PI/2),
                    new THREE.MeshBasicMaterial({ map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
                );
                panel.scale.x = -1;
                sceneScreen.add(panel);
            });
        });

        // The Character
        let panda;
        loader.load(PANDA_FILE, (tex) => {
            panda = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            panda.scale.set(10, 10, 1);
            panda.position.y = 2;
            stageGroup.add(panda);
        });

        // Golden Winding Key
        const keyGroup = new THREE.Group();
        const keyRing = new THREE.Mesh(new THREE.TorusGeometry(0.8, 0.2, 12, 24), new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 1 }));
        keyGroup.add(keyRing);
        keyGroup.position.set(5.5, -1, 0);
        keyGroup.rotation.y = Math.PI / 2;
        mainGroup.add(keyGroup);

        // --- AUDIO & INTERACTION ---
        const listener = new THREE.AudioListener();
        camera.add(listener);
        const sound = new THREE.Audio(listener);
        new THREE.AudioLoader().load(MUSIC_FILE, (buffer) => {
            sound.setBuffer(buffer);
            sound.setLoop(true);
        });

        camera.position.set(0, 6, 18);
        camera.lookAt(0, 0, 0);

        let isOpen = false;
        window.addEventListener('mousedown', () => {
            if (!isOpen) {
                isOpen = true;
                sound.play();
                document.getElementById('instruction').style.opacity = '0';
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.002;

            if (isOpen) {
                // Smoothly open lid
                if (lidGroup.rotation.x > -Math.PI * 0.6) lidGroup.rotation.x -= 0.05;
                
                // Show Interior
                if (stageGroup.scale.x < 1) stageGroup.scale.addScalar(0.05);
                
                sceneScreen.rotation.y += 0.01;
                keyGroup.rotation.z += 0.15; // Fast wind
                
                if (panda) {
                    panda.rotation.y += 0.02; // Ballerina Spin
                    panda.position.y = 2 + Math.sin(time) * 0.2; // Gentle hover
                }
            } else {
                // Idle floating
                mainGroup.position.y = Math.sin(time * 0.5) * 0.5;
                mainGroup.rotation.y = Math.sin(time * 0.3) * 0.1;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
